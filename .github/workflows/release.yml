name: Release

# Builds the Windows installer and publishes it as a GitHub Release
# whenever a version tag (v0.2.0, v1.0.0, ...) is pushed.
# Installed apps pick the release up via electron-updater.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
